<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDParcel Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <nav class="menubar" aria-label="应用菜单">
      <div class="brand">MDParcel</div>
      <div class="menu"><button class="menu-trigger">文件(F)</button><div class="menu-popup">
        <button data-action="new">新建 <kbd>Ctrl+N</kbd></button><button data-action="open">打开… <kbd>Ctrl+O</kbd></button><span class="separator"></span>
        <button data-action="save">保存 <kbd>Ctrl+S</kbd></button><button data-action="save-as">另存为… <kbd>Ctrl+Shift+S</kbd></button><button data-action="export-zip">导出 ZIP…</button><span class="separator"></span><button data-action="insert-image">导入图片…</button>
      </div></div>
      <div class="menu"><button class="menu-trigger">编辑(E)</button><div class="menu-popup edit-menu">
        <div class="menu-column">
          <span class="menu-section-title">编辑</span>
          <button data-action="undo">撤销 <kbd>Ctrl+Z</kbd></button><button data-action="redo">重做 <kbd>Ctrl+Y</kbd></button><span class="separator"></span>
          <button data-action="cut">剪切 <kbd>Ctrl+X</kbd></button><button data-action="copy">复制 <kbd>Ctrl+C</kbd></button><button data-action="paste">粘贴 <kbd>Ctrl+V</kbd></button><button data-action="select-all">全选 <kbd>Ctrl+A</kbd></button><span class="separator"></span>
          <button data-action="find">查找 <kbd>Ctrl+F</kbd></button><button data-action="replace">替换 <kbd>Ctrl+H</kbd></button>
        </div>
        <div class="menu-column">
          <span class="menu-section-title">Markdown 格式</span>
          <button data-action="format-h1">一级标题 <kbd>Ctrl+Alt+1</kbd></button><button data-action="format-h2">二级标题 <kbd>Ctrl+Alt+2</kbd></button><button data-action="format-h3">三级标题 <kbd>Ctrl+Alt+3</kbd></button><span class="separator"></span>
          <button data-action="format-bold">粗体 <kbd>Ctrl+B</kbd></button><button data-action="format-italic">斜体 <kbd>Ctrl+I</kbd></button><button data-action="format-strike">删除线 <kbd>Ctrl+D</kbd></button><button data-action="format-inline-code">行内代码 <kbd>Ctrl+G</kbd></button><span class="separator"></span>
          <button data-action="format-quote">引用</button><button data-action="format-list">无序列表</button><button data-action="format-ordered-list">有序列表</button><button data-action="format-check">任务列表</button><button data-action="format-code">代码块</button><button data-action="format-link">链接 <kbd>Ctrl+K</kbd></button><button data-action="format-table">表格</button>
        </div>
      </div></div>
      <div class="menu"><button class="menu-trigger">视图(V)</button><div class="menu-popup">
        <button data-action="toggle-sidebar">显示/隐藏侧边栏</button>
        <span class="separator"></span>
        <button data-action="toggle-line-numbers">显示行号 <kbd id="line-number-value">关</kbd></button>
        <span class="separator"></span>
        <button data-action="font-decrease">减小字号 <kbd>−</kbd></button><button data-action="font-increase">增大字号 <kbd>+</kbd></button><button data-action="font-reset">恢复默认字号 <kbd id="font-size-value">16 px</kbd></button>
        <span class="separator"></span>
        <button data-action="line-height-decrease">减小行距 <kbd>−</kbd></button><button data-action="line-height-increase">增大行距 <kbd>+</kbd></button><button data-action="line-height-reset">恢复默认行距 <kbd id="line-height-value">1.72</kbd></button>
      </div></div>
      <div class="menu"><button class="menu-trigger">帮助(H)</button><div class="menu-popup"><button data-action="about">关于 MDParcel</button></div></div>
      <div class="window-document" id="window-document">未命名文档</div>
    </nav>

    <div class="tab-strip">
      <button id="sidebar-toggle" class="sidebar-toggle" type="button" title="收起侧边栏" aria-label="收起侧边栏" aria-expanded="true"></button>
      <div id="document-tabs" class="document-tabs" role="tablist" aria-label="打开的文档"></div>
    </div>

    <section id="find-panel" class="find-panel" hidden aria-label="查找和替换">
      <input id="find-input" type="text" placeholder="查找" aria-label="查找内容" />
      <span id="find-count">0/0</span>
      <button data-action="find-previous" title="上一个匹配">↑</button><button data-action="find-next" title="下一个匹配">↓</button>
      <input id="replace-input" type="text" placeholder="替换为" aria-label="替换内容" />
      <button data-action="replace-one">替换</button><button data-action="replace-all">全部替换</button>
      <label><input id="match-case" type="checkbox" /> 区分大小写</label><button data-action="close-find" title="关闭">×</button>
    </section>

    <main id="workspace" class="workspace">
      <aside id="sidebar">
        <div class="sidebar-tabs"><button data-tab="file">文件</button><button data-tab="outline" class="active">大纲</button></div>
        <section id="file-panel" class="sidebar-panel" hidden><div class="document-card"><span class="file-icon">MD</span><div><strong id="file-title">未命名文档</strong><small id="file-path">尚未保存</small></div></div><p class="asset-summary" id="asset-summary">0 个包内资源</p></section>
        <section id="outline-panel" class="sidebar-panel"><div id="outline" class="outline"></div><p id="outline-empty" class="empty-hint">输入 Markdown 标题后会在这里生成大纲。</p></section>
      </aside>
      <div id="sidebar-resizer" class="sidebar-resizer" role="separator" aria-label="调整侧边栏宽度" aria-orientation="vertical" tabindex="0"></div>
      <section id="editor-shell" class="editor-shell">
        <div class="hybrid-pane"><input id="document-title" aria-label="文档标题" value="未命名文档" /><div id="hybrid-editor" aria-label="Markdown 即时渲染编辑器"></div><div id="drop-hint">松开以将图片写入当前 .mdparcel</div></div>
      </section>
    </main>

    <footer class="statusbar"><span id="save-state">已保存</span><span id="mode-state">即时渲染</span><span class="status-spacer"></span><span id="line-count">1 行</span><span id="char-count">0 字符</span><span>UTF-8</span></footer>
    <div id="toast" class="toast" role="status"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
